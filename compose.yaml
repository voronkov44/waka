services:
  api:
    image: api:latest
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api
    restart: unless-stopped
    ports:
      - "28080:8080"
    volumes:
      - ./config.yaml:/config.yaml:ro
    command: ["/api", "-config", "/config.yaml"]
    environment:
      API_ADDRESS: ":8080"
      API_TIMEOUT: "5s"
      LOG_LEVEL: "DEBUG"
      DB_ADDRESS: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable"

      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET}"
      AUTH_TOKEN_TTL: "${AUTH_TOKEN_TTL:-24h}"

      AUTH_ADMIN_NAME: "${AUTH_ADMIN_NAME}"
      AUTH_ADMIN_PASSWORD: "${AUTH_ADMIN_PASSWORD}"

      S3_ENDPOINT: "http://minio:9000"
      S3_PRESIGN_ENDPOINT: "http://localhost:19000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET: "${S3_BUCKET}"
      S3_PUBLIC_BASE_URL: "http://localhost:19000"
      S3_USE_PRESIGNED: "${S3_USE_PRESIGNED:-true}"
      S3_PRESIGN_TTL: "${S3_PRESIGN_TTL:-15m}"

    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}", "-d", "${POSTGRES_DB:-postgres}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    restart: unless-stopped
    ports:
      - "18888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_DISABLE_POSTFIX: "true"
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres

  minio:
    image: minio/minio:latest
    container_name: minio-waka
    restart: unless-stopped
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    command: server /data --console-address ":9001"
    volumes:
      - minio:/data


volumes:
  postgres:
  pgadmin:
  minio:
